<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Generator</title>
    <style>
        /* ── RESET & BASE ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #0d0f14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a4a5a;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f6378;
        }

        /* ── HEADER ── */
        .app-header {
            background: #141a22;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3340;
            flex-wrap: wrap;
            gap: 12px;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, #b7d0f0, #7aa9e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
            background: #2a3340;
            color: #d0d9e6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:hover {
            background: #3a4a5a;
            color: #fff;
        }
        .header-actions button.primary {
            background: #3b7bc9;
            color: #fff;
        }
        .header-actions button.primary:hover {
            background: #4f8edc;
        }
        .header-actions button.danger {
            background: #b03a3a;
            color: #fff;
        }
        .header-actions button.danger:hover {
            background: #cc4a4a;
        }
        .header-actions button.success {
            background: #2f7d5a;
            color: #fff;
        }
        .header-actions button.success:hover {
            background: #3a9a70;
        }

        /* ── MAIN LAYOUT ── */
        .app-main {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            height: calc(100vh - 80px);
        }

        /* ── EDITOR PANEL ── */
        .editor-panel {
            width: 50%;
            min-width: 380px;
            background: #12171f;
            padding: 20px 24px 30px;
            overflow-y: auto;
            border-right: 1px solid #252e3b;
        }
        .editor-panel .section {
            margin-bottom: 22px;
            background: #1a212b;
            border-radius: 10px;
            padding: 18px 20px 20px;
            border: 1px solid #28313e;
        }
        .editor-panel .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8a9bb0;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .editor-panel label {
            display: block;
            font-size: 13px;
            color: #bcc9db;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .editor-panel input,
        .editor-panel textarea {
            width: 100%;
            padding: 8px 12px;
            background: #0d1219;
            border: 1px solid #2d3848;
            border-radius: 6px;
            color: #eef4fc;
            font-size: 14px;
            transition: 0.15s;
            font-family: inherit;
        }
        .editor-panel input:focus,
        .editor-panel textarea:focus {
            outline: none;
            border-color: #4f8edc;
            box-shadow: 0 0 0 3px rgba(79, 142, 220, 0.2);
        }
        .editor-panel textarea {
            resize: vertical;
            min-height: 52px;
        }
        .editor-panel .row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .editor-panel .row>* {
            flex: 1;
            min-width: 120px;
        }

        /* ── LINE ITEMS ── */
        .line-items-container {
            margin-top: 4px;
        }
        .line-item-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            background: #0d1219;
            padding: 8px 10px 8px 12px;
            border-radius: 6px;
            border: 1px solid #232d3b;
            flex-wrap: wrap;
        }
        .line-item-row .li-desc {
            flex: 2;
            min-width: 110px;
        }
        .line-item-row .li-qty {
            flex: 0.6;
            min-width: 60px;
        }
        .line-item-row .li-price {
            flex: 0.8;
            min-width: 80px;
        }
        .line-item-row .li-total {
            flex: 0.8;
            min-width: 70px;
            font-weight: 600;
            color: #b7d0f0;
            text-align: right;
            padding-right: 4px;
        }
        .line-item-row input {
            background: #0d1219;
            border: 1px solid #2d3848;
            border-radius: 4px;
            color: #eef4fc;
            padding: 6px 8px;
            font-size: 13px;
            width: 100%;
            font-family: inherit;
        }
        .line-item-row input:focus {
            outline: none;
            border-color: #4f8edc;
        }
        .line-item-row .li-remove {
            background: none;
            border: none;
            color: #b05a5a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: 0.15s;
        }
        .line-item-row .li-remove:hover {
            color: #e07070;
            transform: scale(1.15);
        }
        .add-item-btn {
            background: #1f2a38;
            border: 1px dashed #3a4a5a;
            color: #b0c8e0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.15s;
            width: 100%;
            margin-top: 2px;
            font-weight: 500;
        }
        .add-item-btn:hover {
            background: #2a384a;
            border-color: #4f8edc;
            color: #fff;
        }

        .tax-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid #25303e;
        }
        .tax-row label {
            margin-bottom: 0;
            font-weight: 500;
            color: #b0c8e0;
        }
        .tax-row input {
            width: 100px;
            padding: 6px 10px;
            background: #0d1219;
            border: 1px solid #2d3848;
            border-radius: 4px;
            color: #eef4fc;
            font-size: 14px;
        }
        .tax-row input:focus {
            outline: none;
            border-color: #4f8edc;
        }
        .tax-row .grand-total-label {
            font-weight: 600;
            color: #b7d0f0;
            margin-left: auto;
        }
        .tax-row .grand-total-value {
            font-size: 20px;
            font-weight: 700;
            color: #7aa9e6;
            min-width: 100px;
            text-align: right;
        }

        /* ── PREVIEW PANEL ── */
        .preview-panel {
            flex: 1;
            background: #181f29;
            padding: 28px 32px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ── INVOICE DOCUMENT ── */
        .invoice-document {
            background: #ffffff;
            color: #1a232e;
            width: 100%;
            max-width: 820px;
            padding: 44px 48px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            line-height: 1.5;
            transition: 0.2s;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        .invoice-document .inv-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #e6ecf3;
            padding-bottom: 18px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .invoice-document .inv-brand h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1a2b3d;
            letter-spacing: -0.3px;
        }
        .invoice-document .inv-brand .business-detail {
            font-size: 13px;
            color: #3e4f62;
            margin-top: 2px;
        }
        .invoice-document .inv-meta {
            text-align: right;
        }
        .invoice-document .inv-meta .inv-number {
            font-size: 20px;
            font-weight: 700;
            color: #1a2b3d;
        }
        .invoice-document .inv-meta .inv-dates {
            font-size: 13px;
            color: #3e4f62;
            margin-top: 4px;
        }
        .invoice-document .inv-meta .inv-dates span {
            display: block;
        }

        .invoice-document .inv-client {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e6ecf3;
        }
        .invoice-document .inv-client .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #6a7f96;
            font-weight: 600;
        }
        .invoice-document .inv-client .client-name {
            font-size: 17px;
            font-weight: 600;
            color: #1a2b3d;
            margin-top: 2px;
        }
        .invoice-document .inv-client .client-address {
            color: #3e4f62;
            font-size: 13px;
        }

        .invoice-document table.inv-items {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 18px;
        }
        .invoice-document table.inv-items th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #6a7f96;
            font-weight: 600;
            padding: 8px 6px 8px 0;
            border-bottom: 2px solid #dce3ec;
        }
        .invoice-document table.inv-items td {
            padding: 10px 6px 10px 0;
            border-bottom: 1px solid #eef2f7;
            color: #1f2e3f;
        }
        .invoice-document table.inv-items .col-desc {
            width: 42%;
        }
        .invoice-document table.inv-items .col-qty {
            width: 14%;
            text-align: center;
        }
        .invoice-document table.inv-items .col-price {
            width: 20%;
            text-align: right;
        }
        .invoice-document table.inv-items .col-total {
            width: 24%;
            text-align: right;
            font-weight: 600;
        }
        .invoice-document table.inv-items .item-total {
            font-weight: 600;
            color: #1a2b3d;
        }

        .invoice-document .inv-summary {
            display: flex;
            justify-content: flex-end;
            padding-top: 8px;
            border-top: 2px solid #dce3ec;
            margin-top: 4px;
        }
        .invoice-document .inv-summary .summary-inner {
            min-width: 200px;
        }
        .invoice-document .inv-summary .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
        }
        .invoice-document .inv-summary .summary-row .label {
            color: #4a5f76;
        }
        .invoice-document .inv-summary .summary-row .value {
            font-weight: 500;
            color: #1a2b3d;
        }
        .invoice-document .inv-summary .summary-row.grand-total {
            font-size: 18px;
            font-weight: 700;
            padding-top: 8px;
            margin-top: 4px;
            border-top: 2px solid #1a2b3d;
        }
        .invoice-document .inv-summary .summary-row.grand-total .value {
            color: #1a2b3d;
        }

        .invoice-document .inv-footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #e6ecf3;
            font-size: 12px;
            color: #5a6f86;
            text-align: center;
        }

        /* ── EMPTY STATE ── */
        .empty-preview {
            color: #5a6f86;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            text-align: center;
            padding: 20px;
            background: #181f29;
            border-radius: 12px;
            border: 2px dashed #2d3848;
        }
        .empty-preview span {
            max-width: 300px;
        }

        /* ── PRINT STYLES ── */
        @media print {
            body {
                background: #fff !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .app-header,
            .editor-panel,
            .preview-panel .empty-preview,
            .no-print {
                display: none !important;
            }
            .app-main {
                height: auto !important;
                display: block !important;
                overflow: visible !important;
            }
            .preview-panel {
                display: block !important;
                background: #fff !important;
                padding: 0 !important;
                overflow: visible !important;
            }
            .invoice-document {
                max-width: 100% !important;
                padding: 0.6in 0.5in !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                margin: 0 auto !important;
                font-size: 12px !important;
                color: #000 !important;
                background: #fff !important;
            }
            .invoice-document .inv-brand h2 {
                font-size: 24px !important;
                color: #000 !important;
            }
            .invoice-document .inv-meta .inv-number {
                font-size: 18px !important;
                color: #000 !important;
            }
            .invoice-document table.inv-items td,
            .invoice-document table.inv-items th {
                padding: 6px 4px 6px 0 !important;
            }
            .invoice-document .inv-summary .summary-row.grand-total {
                font-size: 16px !important;
            }
            .invoice-document .inv-summary .summary-row.grand-total .value {
                color: #000 !important;
            }
            .invoice-document .inv-footer {
                color: #444 !important;
            }
            .invoice-document table.inv-items .item-total {
                color: #000 !important;
            }
            .invoice-document .inv-client .client-name {
                color: #000 !important;
            }
            .invoice-document .inv-client .client-address {
                color: #333 !important;
            }
            .invoice-document .inv-meta .inv-dates {
                color: #333 !important;
            }
            .invoice-document .inv-brand .business-detail {
                color: #333 !important;
            }
            .invoice-document .inv-summary .summary-row .value {
                color: #000 !important;
            }
            .invoice-document .inv-summary .summary-row .label {
                color: #444 !important;
            }
            .invoice-document table.inv-items td {
                color: #000 !important;
            }
            .invoice-document table.inv-items th {
                color: #444 !important;
            }
            .invoice-document .inv-header {
                border-bottom-color: #ccc !important;
            }
            .invoice-document .inv-client {
                border-bottom-color: #ccc !important;
            }
            .invoice-document .inv-summary {
                border-top-color: #ccc !important;
            }
            .invoice-document .inv-summary .summary-row.grand-total {
                border-top-color: #000 !important;
            }
            .invoice-document table.inv-items td {
                border-bottom-color: #e0e0e0 !important;
            }
            .invoice-document table.inv-items th {
                border-bottom-color: #bbb !important;
            }
            .invoice-document .inv-footer {
                border-top-color: #ccc !important;
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 820px) {
            .app-main {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .editor-panel {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid #252e3b;
                max-height: 70vh;
                overflow-y: auto;
            }
            .preview-panel {
                padding: 20px;
                min-height: 500px;
            }
            .invoice-document {
                padding: 28px 22px;
            }
            .app-header {
                padding: 12px 16px;
            }
            .app-header h1 {
                font-size: 18px;
            }
            .header-actions button {
                font-size: 12px;
                padding: 6px 12px;
            }
            .line-item-row {
                flex-wrap: wrap;
            }
            .line-item-row .li-desc {
                flex: 1 1 100%;
            }
            .line-item-row .li-qty,
            .line-item-row .li-price,
            .line-item-row .li-total {
                flex: 1;
                min-width: 60px;
            }
            .tax-row {
                flex-wrap: wrap;
            }
            .tax-row .grand-total-label {
                margin-left: 0;
            }
            .invoice-document .inv-header {
                flex-direction: column;
                align-items: stretch;
                text-align: left;
            }
            .invoice-document .inv-meta {
                text-align: left;
            }
        }
        @media (max-width: 480px) {
            .editor-panel {
                padding: 12px 14px;
            }
            .editor-panel .section {
                padding: 12px 14px;
            }
            .invoice-document {
                padding: 18px 14px;
                font-size: 12px;
            }
            .invoice-document .inv-brand h2 {
                font-size: 20px;
            }
            .invoice-document .inv-meta .inv-number {
                font-size: 16px;
            }
            .header-actions button {
                font-size: 11px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── HEADER ─── -->
    <header class="app-header no-print">
        <h1>📄 Invoice Generator</h1>
        <div class="header-actions">
            <button class="success" id="saveBtn">💾 Save Draft</button>
            <button id="loadBtn">📂 Load Draft</button>
            <button id="exportBtn">📤 Export JSON</button>
            <button class="danger" id="clearBtn">🗑 Clear</button>
            <button class="primary" id="printBtn">🖨 Print</button>
        </div>
    </header>

    <!-- ─── MAIN ─── -->
    <div class="app-main">

        <!-- EDITOR PANEL -->
        <div class="editor-panel no-print" id="editorPanel">

            <!-- Business Info -->
            <div class="section">
                <div class="section-title">Your Business</div>
                <div class="row">
                    <div>
                        <label for="bizName">Business Name</label>
                        <input type="text" id="bizName" placeholder="e.g. Acme Design" />
                    </div>
                    <div>
                        <label for="bizEmail">Email</label>
                        <input type="text" id="bizEmail" placeholder="hello@acme.com" />
                    </div>
                </div>
                <div style="margin-top:8px;">
                    <label for="bizAddress">Address</label>
                    <textarea id="bizAddress" rows="2" placeholder="123 Main St, City, Country"></textarea>
                </div>
            </div>

            <!-- Client Info -->
            <div class="section">
                <div class="section-title">Client</div>
                <div>
                    <label for="clientName">Client Name</label>
                    <input type="text" id="clientName" placeholder="e.g. Jane Doe" />
                </div>
                <div style="margin-top:8px;">
                    <label for="clientAddress">Client Address</label>
                    <textarea id="clientAddress" rows="2" placeholder="456 Oak Ave, City, Country"></textarea>
                </div>
            </div>

            <!-- Invoice Details -->
            <div class="section">
                <div class="section-title">Invoice Details</div>
                <div class="row">
                    <div>
                        <label for="invNumber">Invoice #</label>
                        <input type="text" id="invNumber" placeholder="INV-001" />
                    </div>
                    <div>
                        <label for="invDate">Date</label>
                        <input type="date" id="invDate" />
                    </div>
                    <div>
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" />
                    </div>
                </div>
            </div>

            <!-- Line Items -->
            <div class="section">
                <div class="section-title">Line Items</div>
                <div class="line-items-container" id="lineItemsContainer">
                    <!-- rows injected by JS -->
                </div>
                <button class="add-item-btn" id="addItemBtn">+ Add Line Item</button>

                <div class="tax-row">
                    <label for="taxRate">Tax Rate (%)</label>
                    <input type="number" id="taxRate" value="0" min="0" step="0.5" />
                    <span class="grand-total-label">Grand Total</span>
                    <span class="grand-total-value" id="grandTotalDisplay">$0.00</span>
                </div>
            </div>

            <div style="font-size:12px; color:#5a6f86; text-align:center; padding:6px 0 2px;">
                All data is saved in your browser's local storage.
            </div>
        </div>

        <!-- PREVIEW PANEL -->
        <div class="preview-panel" id="previewPanel">
            <div id="invoicePreview" class="invoice-document">
                <!-- Rendered by JS -->
            </div>
        </div>

    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const state = {
            bizName: '',
            bizEmail: '',
            bizAddress: '',
            clientName: '',
            clientAddress: '',
            invNumber: '',
            invDate: '',
            dueDate: '',
            taxRate: 0,
            items: [
                { id: 'i1', description: 'Web Design', quantity: 1, unitPrice: 150 },
                { id: 'i2', description: 'Development', quantity: 2, unitPrice: 120 },
            ],
        };

        let itemIdCounter = 3;

        // DOM refs
        const $ = (id) => document.getElementById(id);
        const bizName = $('bizName');
        const bizEmail = $('bizEmail');
        const bizAddress = $('bizAddress');
        const clientName = $('clientName');
        const clientAddress = $('clientAddress');
        const invNumber = $('invNumber');
        const invDate = $('invDate');
        const dueDate = $('dueDate');
        const taxRate = $('taxRate');
        const container = $('lineItemsContainer');
        const grandTotalDisplay = $('grandTotalDisplay');
        const previewEl = $('invoicePreview');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function renderItems() {
            container.innerHTML = '';
            state.items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'line-item-row';
                row.dataset.id = item.id;

                const desc = document.createElement('input');
                desc.type = 'text';
                desc.className = 'li-desc';
                desc.placeholder = 'Description';
                desc.value = item.description;
                desc.addEventListener('input', () => {
                    item.description = desc.value;
                    updatePreview();
                });

                const qty = document.createElement('input');
                qty.type = 'number';
                qty.className = 'li-qty';
                qty.placeholder = 'Qty';
                qty.value = item.quantity;
                qty.min = 0;
                qty.step = 1;
                qty.addEventListener('input', () => {
                    const v = parseFloat(qty.value);
                    item.quantity = isNaN(v) ? 0 : v;
                    updatePreview();
                });

                const price = document.createElement('input');
                price.type = 'number';
                price.className = 'li-price';
                price.placeholder = 'Price';
                price.value = item.unitPrice;
                price.min = 0;
                price.step = 0.01;
                price.addEventListener('input', () => {
                    const v = parseFloat(price.value);
                    item.unitPrice = isNaN(v) ? 0 : v;
                    updatePreview();
                });

                const totalSpan = document.createElement('span');
                totalSpan.className = 'li-total';
                totalSpan.textContent = formatCurrency(item.quantity * item.unitPrice);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'li-remove';
                removeBtn.textContent = '✕';
                removeBtn.title = 'Remove item';
                removeBtn.addEventListener('click', () => {
                    if (state.items.length <= 1) return;
                    state.items = state.items.filter(it => it.id !== item.id);
                    renderItems();
                    updatePreview();
                });

                row.appendChild(desc);
                row.appendChild(qty);
                row.appendChild(price);
                row.appendChild(totalSpan);
                row.appendChild(removeBtn);
                container.appendChild(row);

                // Keep total updated on any change
                const updateTotal = () => {
                    const q = parseFloat(qty.value) || 0;
                    const p = parseFloat(price.value) || 0;
                    totalSpan.textContent = formatCurrency(q * p);
                    updatePreview();
                };
                qty.addEventListener('change', updateTotal);
                price.addEventListener('change', updateTotal);
                desc.addEventListener('change', updatePreview);
            });
        }

        function formatCurrency(val) {
            return '$' + val.toFixed(2);
        }

        function getGrandTotal() {
            let subtotal = 0;
            state.items.forEach(it => {
                subtotal += (it.quantity || 0) * (it.unitPrice || 0);
            });
            const rate = parseFloat(state.taxRate) || 0;
            const tax = subtotal * (rate / 100);
            return subtotal + tax;
        }

        function updatePreview() {
            // Read all form values into state
            state.bizName = bizName.value.trim();
            state.bizEmail = bizEmail.value.trim();
            state.bizAddress = bizAddress.value.trim();
            state.clientName = clientName.value.trim();
            state.clientAddress = clientAddress.value.trim();
            state.invNumber = invNumber.value.trim();
            state.invDate = invDate.value;
            state.dueDate = dueDate.value;
            state.taxRate = parseFloat(taxRate.value) || 0;

            // Update item totals (already in state via input events)
            // Recalculate and show grand total
            const grand = getGrandTotal();
            grandTotalDisplay.textContent = formatCurrency(grand);

            // Build preview HTML
            const itemsHtml = state.items.map(it => {
                const total = (it.quantity || 0) * (it.unitPrice || 0);
                return `
                        <tr>
                            <td class="col-desc">${escHtml(it.description || '')}</td>
                            <td class="col-qty">${it.quantity || 0}</td>
                            <td class="col-price">${formatCurrency(it.unitPrice || 0)}</td>
                            <td class="col-total item-total">${formatCurrency(total)}</td>
                        </tr>
                    `;
            }).join('');

            const subtotal = state.items.reduce((sum, it) => sum + (it.quantity || 0) * (it.unitPrice || 0), 0);
            const taxAmt = subtotal * (state.taxRate / 100);

            const bizNameDisplay = state.bizName || 'Your Business';
            const bizEmailDisplay = state.bizEmail ? ' · ' + state.bizEmail : '';
            const bizAddrDisplay = state.bizAddress ? state.bizAddress.replace(/\n/g, ', ') : '';

            const clientNameDisplay = state.clientName || 'Client Name';
            const clientAddrDisplay = state.clientAddress ? state.clientAddress.replace(/\n/g, ', ') : '';

            const invNumberDisplay = state.invNumber || 'INV-001';
            const dateDisplay = state.invDate ? formatDate(state.invDate) : '';
            const dueDisplay = state.dueDate ? formatDate(state.dueDate) : '';

            previewEl.innerHTML = `
                    <div class="inv-header">
                        <div class="inv-brand">
                            <h2>${escHtml(bizNameDisplay)}</h2>
                            <div class="business-detail">
                                ${escHtml(bizAddrDisplay)}${bizEmailDisplay}
                            </div>
                        </div>
                        <div class="inv-meta">
                            <div class="inv-number">${escHtml(invNumberDisplay)}</div>
                            <div class="inv-dates">
                                ${dateDisplay ? `<span>Date: ${dateDisplay}</span>` : ''}
                                ${dueDisplay ? `<span>Due: ${dueDisplay}</span>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="inv-client">
                        <div class="label">Bill To</div>
                        <div class="client-name">${escHtml(clientNameDisplay)}</div>
                        ${clientAddrDisplay ? `<div class="client-address">${escHtml(clientAddrDisplay)}</div>` : ''}
                    </div>

                    ${state.items.length === 0 ? `
                        <div style="text-align:center; padding:24px 0; color:#8a9bb0; font-style:italic;">
                            No line items added yet.
                        </div>
                    ` : `
                        <table class="inv-items">
                            <thead>
                                <tr>
                                    <th class="col-desc">Description</th>
                                    <th class="col-qty">Qty</th>
                                    <th class="col-price">Unit Price</th>
                                    <th class="col-total">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itemsHtml}
                            </tbody>
                        </table>
                    `}

                    <div class="inv-summary">
                        <div class="summary-inner">
                            <div class="summary-row">
                                <span class="label">Subtotal</span>
                                <span class="value">${formatCurrency(subtotal)}</span>
                            </div>
                            ${state.taxRate > 0 ? `
                                <div class="summary-row">
                                    <span class="label">Tax (${state.taxRate}%)</span>
                                    <span class="value">${formatCurrency(taxAmt)}</span>
                                </div>
                            ` : ''}
                            <div class="summary-row grand-total">
                                <span class="label">Grand Total</span>
                                <span class="value">${formatCurrency(getGrandTotal())}</span>
                            </div>
                        </div>
                    </div>

                    <div class="inv-footer">
                        Thank you for your business.
                    </div>
                `;
        }

        function escHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00');
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  BIND UI → STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function bindInput(el, key) {
            el.addEventListener('input', () => {
                state[key] = el.value;
                updatePreview();
            });
            el.addEventListener('change', updatePreview);
        }

        function initBindings() {
            bindInput(bizName, 'bizName');
            bindInput(bizEmail, 'bizEmail');
            bindInput(bizAddress, 'bizAddress');
            bindInput(clientName, 'clientName');
            bindInput(clientAddress, 'clientAddress');
            bindInput(invNumber, 'invNumber');
            bindInput(invDate, 'invDate');
            bindInput(dueDate, 'dueDate');
            taxRate.addEventListener('input', () => {
                state.taxRate = parseFloat(taxRate.value) || 0;
                updatePreview();
            });
            taxRate.addEventListener('change', updatePreview);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ACTIONS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        $('addItemBtn').addEventListener('click', () => {
            state.items.push({
                id: 'i' + (itemIdCounter++),
                description: '',
                quantity: 1,
                unitPrice: 0,
            });
            renderItems();
            updatePreview();
            // scroll to bottom of container
            container.scrollIntoView({ behavior: 'smooth', block: 'end' });
        });

        $('printBtn').addEventListener('click', () => {
            window.print();
        });

        $('saveBtn').addEventListener('click', () => {
            // Gather all data
            const data = {
                bizName: bizName.value,
                bizEmail: bizEmail.value,
                bizAddress: bizAddress.value,
                clientName: clientName.value,
                clientAddress: clientAddress.value,
                invNumber: invNumber.value,
                invDate: invDate.value,
                dueDate: dueDate.value,
                taxRate: taxRate.value,
                items: state.items.map(it => ({
                    id: it.id,
                    description: it.description,
                    quantity: it.quantity,
                    unitPrice: it.unitPrice,
                })),
                _meta: { savedAt: new Date().toISOString() }
            };
            try {
                localStorage.setItem('invoiceDraft', JSON.stringify(data));
                showToast('Draft saved successfully!', 'success');
            } catch (e) {
                showToast('Failed to save draft.', 'error');
            }
        });

        $('loadBtn').addEventListener('click', () => {
            try {
                const raw = localStorage.getItem('invoiceDraft');
                if (!raw) {
                    showToast('No draft found in local storage.', 'info');
                    return;
                }
                const data = JSON.parse(raw);
                bizName.value = data.bizName || '';
                bizEmail.value = data.bizEmail || '';
                bizAddress.value = data.bizAddress || '';
                clientName.value = data.clientName || '';
                clientAddress.value = data.clientAddress || '';
                invNumber.value = data.invNumber || '';
                invDate.value = data.invDate || '';
                dueDate.value = data.dueDate || '';
                taxRate.value = data.taxRate || 0;
                if (data.items && data.items.length > 0) {
                    state.items = data.items.map(it => ({
                        id: it.id || 'i' + (itemIdCounter++),
                        description: it.description || '',
                        quantity: it.quantity || 0,
                        unitPrice: it.unitPrice || 0,
                    }));
                } else {
                    state.items = [{ id: 'i' + (itemIdCounter++), description: '', quantity: 1, unitPrice: 0 }];
                }
                renderItems();
                updatePreview();
                showToast('Draft loaded successfully!', 'success');
            } catch (e) {
                showToast('Failed to load draft: ' + e.message, 'error');
            }
        });

        $('exportBtn').addEventListener('click', () => {
            const data = {
                bizName: bizName.value,
                bizEmail: bizEmail.value,
                bizAddress: bizAddress.value,
                clientName: clientName.value,
                clientAddress: clientAddress.value,
                invNumber: invNumber.value,
                invDate: invDate.value,
                dueDate: dueDate.value,
                taxRate: taxRate.value,
                items: state.items.map(it => ({
                    description: it.description,
                    quantity: it.quantity,
                    unitPrice: it.unitPrice,
                })),
                grandTotal: getGrandTotal(),
                exportedAt: new Date().toISOString(),
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const fname = 'invoice-' + (invNumber.value || 'draft') + '.json';
            a.download = fname;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Exported as ' + fname, 'success');
        });

        $('clearBtn').addEventListener('click', () => {
            if (!confirm('Clear all fields and reset invoice?')) return;
            bizName.value = '';
            bizEmail.value = '';
            bizAddress.value = '';
            clientName.value = '';
            clientAddress.value = '';
            invNumber.value = '';
            invDate.value = '';
            dueDate.value = '';
            taxRate.value = '0';
            state.items = [{ id: 'i' + (itemIdCounter++), description: '', quantity: 1, unitPrice: 0 }];
            renderItems();
            updatePreview();
            showToast('Cleared all data.', 'info');
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TOAST
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function showToast(msg, type) {
            const old = document.querySelector('.toast-notification');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'toast-notification';
            const colors = {
                success: '#2f7d5a',
                error: '#b03a3a',
                info: '#3a6a8a',
            };
            const bg = colors[type] || '#2a3340';
            Object.assign(div.style, {
                position: 'fixed',
                bottom: '30px',
                left: '50%',
                transform: 'translateX(-50%)',
                background: bg,
                color: '#fff',
                padding: '12px 28px',
                borderRadius: '8px',
                fontFamily: "'Segoe UI', sans-serif",
                fontSize: '14px',
                fontWeight: '500',
                boxShadow: '0 6px 24px rgba(0,0,0,0.5)',
                zIndex: '9999',
                opacity: '0',
                transition: 'opacity 0.25s ease',
                maxWidth: '90%',
                textAlign: 'center',
                pointerEvents: 'none',
            });
            div.textContent = msg;
            document.body.appendChild(div);
            requestAnimationFrame(() => { div.style.opacity = '1'; });
            setTimeout(() => {
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 300);
            }, 2800);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function init() {
            // Default date: today
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            invDate.value = y + '-' + m + '-' + d;
            // Due date: +14 days
            const due = new Date(today);
            due.setDate(due.getDate() + 14);
            const y2 = due.getFullYear();
            const m2 = String(due.getMonth() + 1).padStart(2, '0');
            const d2 = String(due.getDate()).padStart(2, '0');
            dueDate.value = y2 + '-' + m2 + '-' + d2;

            // Set default invoice number
            invNumber.value = 'INV-' + String(today.getFullYear()).slice(2) +
                String(today.getMonth() + 1).padStart(2, '0') +
                String(today.getDate()).padStart(2, '0') +
                '-' + String(Math.floor(Math.random() * 1000)).padStart(3, '0');

            state.bizName = 'Acme Studio';
            state.bizEmail = 'hello@acme.studio';
            state.bizAddress = '123 Creative Ln, Design City, DC 10001';
            state.clientName = 'Jane Client';
            state.clientAddress = '456 Oak Ave, Metropolis, MP 20002';

            bizName.value = state.bizName;
            bizEmail.value = state.bizEmail;
            bizAddress.value = state.bizAddress;
            clientName.value = state.clientName;
            clientAddress.value = state.clientAddress;

            // Ensure items exist
            if (state.items.length === 0) {
                state.items = [{ id: 'i' + (itemIdCounter++), description: 'Web Design', quantity: 1, unitPrice: 150 }];
            }

            renderItems();
            initBindings();
            updatePreview();

            // If there's a draft in localStorage, offer to load it
            try {
                const raw = localStorage.getItem('invoiceDraft');
                if (raw) {
                    const data = JSON.parse(raw);
                    // Only show prompt if the draft has some content
                    if (data.bizName || data.clientName || data.items?.length) {
                        setTimeout(() => {
                            if (confirm('A saved draft was found. Load it now?')) {
                                $('loadBtn').click();
                            }
                        }, 400);
                    }
                }
            } catch (_) { /* ignore */ }
        }

        init();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  KEYBOARD SHORTCUTS (optional)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                $('saveBtn').click();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                // Let browser handle print normally, but we also have a button.
            }
        });
    </script>

</body>
</html>
